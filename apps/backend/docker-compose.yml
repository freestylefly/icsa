# Phase 2 依赖服务 Docker Compose 配置
# 包含：PostgreSQL (pgvector)、Redis、MinIO

version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg15
    container_name: kb-postgres
    environment:
      POSTGRES_USER: knowledge_base
      POSTGRES_PASSWORD: kb_password_2024
      POSTGRES_DB: knowledge_base_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_base"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: kb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  # MinIO
  minio:
    image: minio/minio
    container_name: kb-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kb-network

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

networks:
  kb-network:
    driver: bridge
