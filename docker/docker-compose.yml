version: '3.8'

services:
  # PostgreSQL 数据库 (带 pgvector 扩展)
  postgres:
    image: pgvector/pgvector:pg15
    container_name: icsa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: icsa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - icsa-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: icsa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - icsa-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: icsa-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - icsa-network

  # 后端服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: icsa-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/icsa_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: customer-service
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      ALIYUN_API_KEY: ${ALIYUN_API_KEY:-}
      ALIYUN_API_SECRET: ${ALIYUN_API_SECRET:-}
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ../apps/backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - icsa-network
    command: sh -c "pnpm db:generate && pnpm db:migrate && pnpm dev"

  # 前端服务
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: icsa-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - icsa-network
    command: pnpm dev --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  icsa-network:
    driver: bridge
